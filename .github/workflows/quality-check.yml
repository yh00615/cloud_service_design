name: Quality Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run type check
        run: npm run type-check
        continue-on-error: true

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run build test
        run: npm run build
        continue-on-error: false
