AWSTemplateFormatVersion: '2010-09-09'
Description: 'Week 12-1: Secrets Manager with RDS Auto-Rotation Lab Environment'

Parameters:
  ProjectTag:
    Type: String
    Default: 'AWS-Lab'
    Description: Project tag value

  WeekTag:
    Type: String
    Default: '12-1'
    Description: Week tag value

  CreatedByTag:
    Type: String
    Default: 'CloudFormation'
    Description: CreatedBy tag value

  DBUsername:
    Type: String
    Default: 'admin'
    Description: Database master username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'

  DBPassword:
    Type: String
    Default: 'TempPassword123!'
    Description: Temporary database password (will be rotated by Secrets Manager)
    NoEcho: true
    MinLength: 8
    MaxLength: 41

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: week12-1-secrets-vpc
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # Private Subnets (for RDS)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: week12-1-private-subnet-1
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: week12-1-private-subnet-2
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # DB Subnet Group
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: week12-1-db-subnet-group
      DBSubnetGroupDescription: Subnet group for RDS instance
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: week12-1-db-subnet-group
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # Security Group for RDS
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: week12-1-rds-sg
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Allow MySQL from Lambda
      Tags:
        - Key: Name
          Value: week12-1-rds-sg
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # Security Group for Lambda
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: week12-1-lambda-sg
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          DestinationSecurityGroupId: !Ref DBSecurityGroup
          Description: Allow MySQL to RDS
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS for Secrets Manager/Parameter Store
      Tags:
        - Key: Name
          Value: week12-1-lambda-sg
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # RDS MySQL Instance
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: week12-1-mysql-db
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: '8.0.39'
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: 20
      StorageType: gp3
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 0
      MultiAZ: false
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: week12-1-mysql-db
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: week12-1-lambda-secrets-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:prod/db/mysql/credentials-*'
        - PolicyName: ParameterStoreAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/prod/app/config/*'
        - PolicyName: KMSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # Lambda Function
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: access-secrets-demo
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      Environment:
        Variables:
          DB_HOST: !GetAtt RDSInstance.Endpoint.Address
          DB_PORT: !GetAtt RDSInstance.Endpoint.Port
          SECRET_NAME: prod/db/mysql/credentials
          PARAMETER_NAME: /prod/app/config/db-connection-string
      Code:
        ZipFile: |
          import json
          import boto3
          import pymysql
          import os
          from botocore.exceptions import ClientError

          def lambda_handler(event, context):
              # Initialize AWS clients
              secrets_client = boto3.client('secretsmanager')
              ssm_client = boto3.client('ssm')
              
              results = {}
              
              try:
                  # 1. Get database credentials from Secrets Manager
                  secret_name = os.environ['SECRET_NAME']
                  secret_response = secrets_client.get_secret_value(SecretId=secret_name)
                  db_credentials = json.loads(secret_response['SecretString'])
                  
                  results['secrets_manager'] = {
                      'secret_name': secret_name,
                      'username': db_credentials.get('username'),
                      'password_length': len(db_credentials.get('password', '')),
                      'status': 'Retrieved successfully'
                  }
                  
                  # 2. Get parameter from Parameter Store
                  parameter_name = os.environ['PARAMETER_NAME']
                  parameter_response = ssm_client.get_parameter(
                      Name=parameter_name,
                      WithDecryption=True
                  )
                  
                  results['parameter_store'] = {
                      'parameter_name': parameter_name,
                      'value': parameter_response['Parameter']['Value'],
                      'type': parameter_response['Parameter']['Type'],
                      'status': 'Retrieved successfully'
                  }
                  
                  # 3. Connect to RDS MySQL database
                  db_host = os.environ['DB_HOST']
                  db_port = int(os.environ['DB_PORT'])
                  db_user = db_credentials['username']
                  db_password = db_credentials['password']
                  
                  connection = pymysql.connect(
                      host=db_host,
                      port=db_port,
                      user=db_user,
                      password=db_password,
                      connect_timeout=5
                  )
                  
                  with connection.cursor() as cursor:
                      cursor.execute("SELECT VERSION()")
                      db_version = cursor.fetchone()[0]
                      cursor.execute("SELECT DATABASE()")
                      current_db = cursor.fetchone()[0]
                  
                  connection.close()
                  
                  results['database_connection'] = {
                      'host': db_host,
                      'port': db_port,
                      'username': db_user,
                      'mysql_version': db_version,
                      'current_database': current_db,
                      'status': 'Connected successfully'
                  }
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps(results, indent=2)
                  }
                  
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'error': 'AWS API Error',
                          'message': str(e)
                      })
                  }
              except pymysql.MySQLError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'error': 'Database Connection Error',
                          'message': str(e),
                          'partial_results': results
                      })
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'error': 'Unexpected Error',
                          'message': str(e),
                          'partial_results': results
                      })
                  }
      Layers:
        - !Sub 'arn:aws:lambda:${AWS::Region}:770693421928:layer:Klayers-p312-pymysql:7'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Week
          Value: !Ref WeekTag
        - Key: CreatedBy
          Value: !Ref CreatedByTag

  # CloudWatch Log Group
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${LambdaFunction}'
      RetentionInDays: 7

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC

  DBEndpoint:
    Description: RDS MySQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  DBPort:
    Description: RDS MySQL port
    Value: !GetAtt RDSInstance.Endpoint.Port

  DBUsername:
    Description: Database master username
    Value: !Ref DBUsername

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref LambdaFunction

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn

  LambdaRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

  SetupInstructions:
    Description: Next steps
    Value: |
      1. Create KMS key: 'secrets-encryption-key'
      2. Create Secrets Manager secret: 'prod/db/mysql/credentials' with RDS credentials
      3. Configure automatic rotation for the secret
      4. Create Parameter Store parameter: '/prod/app/config/db-connection-string'
      5. Test Lambda function to verify secret retrieval and database connection
